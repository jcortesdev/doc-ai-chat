packages:
  - "apps/*"
  - "packages/*"
# Build scripts approved to run (pnpm reads this `allowBuilds` map; true = run the
# package's install/build script). protobufjs arrived transitively with @upstash/*
# in M4. Without these set to booleans, pnpm fails install with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  "@biomejs/biome": true
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  protobufjs: true
  sharp: true
